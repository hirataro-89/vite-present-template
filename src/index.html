<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vite Static Site Template</title>
  <meta name="description" content="Viteを用いた静的サイト構築のためのミニマルテンプレートです。" />
</head>
<body>
  <header class="l-header">
    <div class="l-header__inner l-inner">
      <h1 class="l-header__logo">
        <a class="l-header__logo-link" href="#">Logo</a>
      </h1>
      <nav class="l-header__nav">
        <ul class="l-header__nav-list">
          <li><a class="l-header__nav-link" href="#">私たちについて</a></li>
          <li><a class="l-header__nav-link" href="#">事業内容</a></li>
          <li><a class="l-header__nav-link" href="#">お知らせ</a></li>
          <li><a class="c-button c-button--primary c-button--sm" href="#">お問い合わせ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="l-mv">
      <div class="l-inner">
        <h2 class="l-mv__main-title">メインタイトルだよ</h2>
        <p class="l-mv__sub-title">
          ここにサブタイトルが入ります。<br />
          ここにサブタイトルが入ります。ここにサブタイトルが入ります。
        </p>
      </div>
    </section>

    <section class="l-section">
      <div class="l-inner">
        <h2 class="c-section-title">sample</h2>
        <p class="l-section__text">
          ここに本文コンテンツが入ります。<br />
          このテンプレートを起点に、自由にセクションやコンポーネントを追加してください。
        </p>
        <div class="l-section__buttons">
          <a class="c-button c-button--primary" href="#">詳しく見る</a>
          <a class="c-button c-button--outline" href="#">お問い合わせ</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="l-footer">
    <div class="l-footer__inner l-inner">
      <div class="l-footer__content">
        <p class="l-footer__logo">
          <a class="l-footer__logo-link" href="#">Logo</a>
        </p>
        <nav class="l-footer__nav">
          <ul class="l-footer__nav-list">
            <li><a class="l-footer__nav-link" href="#">ホーム</a></li>
            <li><a class="l-footer__nav-link" href="#">私たちについて</a></li>
            <li><a class="l-footer__nav-link" href="#">事業内容</a></li>
            <li><a class="l-footer__nav-link" href="#">お問い合わせ</a></li>
          </ul>
        </nav>
      </div>
      <p class="l-footer__copy">&copy; 2025 Vite Template. All rights reserved.</p>
    </div>
  </footer>

  <script type="module" src="/script.js"></script>
</body>
</html>
